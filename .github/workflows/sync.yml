name: Docker Tools Sync

on:
  schedule:
    # 每小时运行一次 (cron: 0 */1 * * *)
    - cron: '12 12 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
        
    - name: 安装依赖
      run: |
        pip install requests
        
    - name: 创建data目录
      run: |
        mkdir -p ./data
        
    - name: 运行同步脚本
      run: |
        python sync.py
        
    # - name: 删除现有的 Release 和 Tag
    #   if: success()
    #   run: |
    #     # 删除现有的 latest release
    #     # RELEASE_ID=$(gh api repos/:owner/:repo/releases/tags/latest --jq '.id' 2>/dev/null || echo "")
    #     # 修复：获取最新的 Release ID（不再用 latest 标签）
    #     RELEASE_ID=$(gh release list --limit 1 --json id -q ".[0].id" 2>/dev/null || echo "")
    #     if [ ! -z "$RELEASE_ID" ]; then
    #       echo "删除现有的 latest release (ID: $RELEASE_ID)"
    #       gh api --method DELETE repos/:owner/:repo/releases/$RELEASE_ID
    #     fi
        
    #     # 删除现有的 latest tag
    #     if git rev-parse --verify refs/tags/latest >/dev/null 2>&1; then
    #       echo "删除现有的 latest tag"
    #       git tag -d latest
    #       git push origin :refs/tags/latest
    #     fi
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 彻底删除所有 latest Release 和 Tag
      if: success()
      run: |
        # ==============================================
        # 1. 找到 所有 名称为 latest 的 release 并全部删除
        # ==============================================
        echo "查找所有名为 latest 的 release..."
        RELEASE_IDS=$(gh api repos/:owner/:repo/releases --jq '.[] | select(.tag_name=="latest") | .id')
    
        if [ -n "$RELEASE_IDS" ]; then
          echo "找到旧的 latest release，开始删除..."
          for ID in $RELEASE_IDS; do
            echo "删除 release ID: $ID"
            gh api --method DELETE repos/:owner/:repo/releases/$ID
          done
        else
          echo "没有找到 latest release，跳过删除"
        fi
    
        # ==============================================
        # 2. 强制删除本地和远程的 latest tag（不管是否存在）
        # ==============================================
        echo "删除 latest tag（本地 + 远程）..."
        git tag -d latest 2>/dev/null || true
        git push origin --delete latest 2>/dev/null || true
    
        echo "✅ 所有 latest 相关数据已彻底清空"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        files: |
          data/**
        tag_name: latest
        name: Docker Tools Latest
        body: |
          ## Docker Tools 最新版本
          
          ### 说明:
          自动从官方仓库同步的最新 Docker 相关工具。
          
          **注意**: 这是一个自动更新的 Release，每次发现新版本时会自动替换文件。
        draft: false
        prerelease: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
